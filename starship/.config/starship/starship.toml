"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
style = "blue"
truncation_length = 8
truncation_symbol = '…/'
truncate_to_repo = false


[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(* $conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "="
untracked = "?${count}"
modified = "!${count}"
staged = ""
renamed = "»${count}"
deleted = "✘${count}"
stashed = "≡"
# if you got problems with the ahead_behind, it's probably because your branch is not being tracked, use this command: 
# git branch --set-upstream-to=origin/YOUR_BRANCH
ahead = '⇡'
behind = '⇣'

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
